# Safari Bois — Render Infrastructure-as-Code
# Deploy all services from this single file via Render Blueprint

databases:
  - name: safari-db
    plan: free
    databaseName: safari_db
    user: safari_user

services:
  # 1. Customer-facing website
  - type: web
    name: safari-customer
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safari-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: NEXT_PUBLIC_TELEGRAM_BOT_USERNAME
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

  # 2. Admin panel (separate deployment, same codebase)
  - type: web
    name: safari-admin
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && ENABLE_ADMIN=true npm run build
    startCommand: ENABLE_ADMIN=true npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safari-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: ENABLE_ADMIN
        value: "true"
      - key: TELEGRAM_BOT_1_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: NEXT_PUBLIC_TELEGRAM_BOT_USERNAME
        sync: false

  # 3. Telegram bot (background worker, long-polling)
  - type: worker
    name: safari-bot
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: node --import tsx src/bots/runner.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safari-db
          property: connectionString
      - key: TELEGRAM_BOT_1_TOKEN
        sync: false
      - key: TELEGRAM_BOT_2_TOKEN
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
