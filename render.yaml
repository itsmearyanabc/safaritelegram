# SafariBoyz — Render Infrastructure-as-Code
# Deploy all services from this single file via Render Blueprint

databases:
  - name: safari-db
    plan: free
    databaseName: safari_db
    user: safari_user

services:
  # 1. Website (Customer + Admin on the same deployment)
  - type: web
    name: safari-web
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safari-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_1_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: NEXT_PUBLIC_TELEGRAM_BOT_USERNAME
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

  # 2. Telegram bot (background worker, long-polling)
  - type: worker
    name: safari-bot
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node --import tsx src/bots/runner.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safari-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_1_TOKEN
        sync: false
      - key: TELEGRAM_BOT_2_TOKEN
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
